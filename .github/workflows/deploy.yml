name: Deploy Backend to Production

on:
  push:
    branches: [ main ]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Deployment triggered
        run: |
          echo "✅ Push to main received. The host polling timer will pull and redeploy within 60 seconds."
          echo "Monitor: sudo journalctl -u sathvam-auto-deploy -f"
