name: Deploy Backend to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          PAYLOAD='{"ref":"refs/heads/main","commits":[{"id":"ci"}],"pusher":{"name":"github-actions"}}'
          SIG=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print "sha256="$2}')
          curl -sf -X POST https://api.sathvam.in/webhook/backend \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIG" \
            -d "$PAYLOAD"
